<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance - Gino Service</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { overflow: hidden; }

/* glow button */
@keyframes glow {
  0%, 100% { box-shadow: 0 0 10px #0ea5e9; }
  50% { box-shadow: 0 0 25px #38bdf8; }
}

canvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}
</style>

</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

<!-- PARTICLE BACKGROUND -->
<canvas id="stars"></canvas>

<!-- STATIC BACKGROUND -->
<div class="absolute inset-0 bg-gradient-to-br from-sky-900 via-slate-900 to-black"></div>

<div class="absolute inset-0">
  <div class="absolute w-72 h-72 bg-sky-500/20 rounded-full blur-3xl top-20 left-10"></div>
  <div class="absolute w-72 h-72 bg-blue-400/20 rounded-full blur-3xl bottom-10 right-10"></div>
</div>

<!-- CONTENT -->
<div class="relative z-10 text-center px-6">

    <img src="./src/img/Logogncrop.png"
         class="w-20 mx-auto mb-6 animate-pulse">

    <h1 class="text-3xl md:text-4xl font-bold mb-3">
        Website Sedang Maintenance
    </h1>

    <p class="text-slate-300 mb-6">
        Kami akan kembali online dalam:
    </p>

    <!-- COUNTDOWN -->
    <div class="flex justify-center gap-6 mb-8">

        <div>
            <p id="days" class="text-3xl font-bold">00</p>
            <span class="text-sm text-slate-400">Hari</span>
        </div>

        <div>
            <p id="hours" class="text-3xl font-bold">00</p>
            <span class="text-sm text-slate-400">Jam</span>
        </div>

        <div>
            <p id="minutes" class="text-3xl font-bold">00</p>
            <span class="text-sm text-slate-400">Menit</span>
        </div>

        <div>
            <p id="seconds" class="text-3xl font-bold">00</p>
            <span class="text-sm text-slate-400">Detik</span>
        </div>

    </div>

</div>

<script>

// ==========================
// COUNTDOWN
// ==========================
const targetDate = new Date("2026-03-27T18:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance < 0) {
        document.body.innerHTML = "<h1 style='text-align:center;margin-top:20%;font-size:24px;'>Website sudah online 🚀</h1>";
        return;
    }

    document.getElementById("days").innerText = Math.floor(distance / (1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor((distance / (1000*60*60)) % 24);
    document.getElementById("minutes").innerText = Math.floor((distance / (1000*60)) % 60);
    document.getElementById("seconds").innerText = Math.floor((distance / 1000) % 60);

}, 1000);


// ==========================
// PARTICLE STARS
// ==========================
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        speed: Math.random() * 0.5
    });
}

function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();

        star.y += star.speed;

        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(drawStars);
}

drawStars();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
